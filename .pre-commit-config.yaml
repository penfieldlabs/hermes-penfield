# hermes-penfield pre-commit hooks
#
# Install once after cloning:
#   pip install -e ".[dev]"
#   pre-commit install --hook-type pre-commit

repos:
  - repo: local
    hooks:
      - id: ruff-check
        name: ruff check
        entry: ruff check
        language: system
        types: [python]
        pass_filenames: false
        stages: [pre-commit]

      - id: ruff-format
        name: ruff format --check
        entry: ruff format --check
        language: system
        types: [python]
        pass_filenames: false
        stages: [pre-commit]

      - id: mypy
        name: mypy
        entry: mypy
        language: system
        types: [python]
        pass_filenames: false
        stages: [pre-commit]
        args: [auth.py, client.py, config.py, constants.py, exceptions.py, provider.py, tools.py, cli.py, __init__.py]
