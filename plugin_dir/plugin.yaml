name: penfield
version: 0.1.0
description: "Penfield persistent memory for Hermes Agent — cross-session knowledge graph with hybrid search, typed connections, and artifact storage."
# The implementation ships via pip; this directory shim imports from it.
pip_dependencies:
  - "hermes-penfield>=0.1.0"
requires_env: []
provides_tools:
  - penfield_store
  - penfield_recall
  - penfield_search
  - penfield_connect
  - penfield_fetch
  - penfield_update
  - penfield_delete
  - penfield_explore
  - penfield_reflect
  - penfield_list_artifacts
  - penfield_save_artifact
  - penfield_retrieve_artifact
  - penfield_awaken
hooks:
  - on_session_end
  - on_pre_compress
